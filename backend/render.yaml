# Render Blueprint for the StyleAI FastAPI backend.
# Deploy: Render Dashboard -> New -> Blueprint -> point at this repo.
# Secrets (sync: false) are NOT stored in git -- you paste them in the
# Render dashboard once, matching the values in backend/.env.
services:
  - type: web
    name: styleai-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Pin to 3.12 -- rembg/onnxruntime have no 3.13 wheel (see requirements.txt)
      - key: PYTHON_VERSION
        value: 3.12.9

      # --- Secrets: set these in the Render dashboard (copy from backend/.env) ---
      - key: RUNWAY_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: RUNWAY_DEFAULT_VOICE_ID
        sync: false
      - key: STYLIST_CHARACTER_ID
        sync: false
      - key: STYLIST_HERO_VIDEO_URL
        sync: false

      # --- AWS Aurora (core relational data via IAM-token auth). See services/db.py. ---
      # IAM mode mints a short-lived DB token per connection: no DB password, but the
      # backend needs AWS creds (scoped to rds-db:connect) + region. Paste all of these
      # in the Render dashboard (copy from backend/.env).
      - key: AURORA_IAM_AUTH
        value: "true"
      - key: AURORA_PORT
        value: "5432"
      - key: AURORA_DB
        value: postgres
      - key: AURORA_USER
        value: postgres
      - key: AWS_REGION
        value: ap-south-1
      - key: AURORA_HOST
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

      # Your Vercel frontend URL -- drives CORS in main.py. Set after frontend deploy.
      - key: FRONTEND_URL
        sync: false
